function renderMyIdeas() {
    const myIdeas = getVisibleIdeas();
    const statuses = ['all', 'draft', 'submitted', 'needs_review', 'eligible', 'ineligible', 'shortlisted', 'finalist', 'winner'];
    const counts   = {};
    statuses.forEach(s => counts[s] = s === 'all' ? myIdeas.length : myIdeas.filter(i => i.status === s).length);

    const activeStatuses = statuses.filter(s => s === 'all' || counts[s] > 0);

    const tabsHtml = activeStatuses.map(s => `
        <button class="filter-tab${_myIdeasFilter === s ? ' active' : ''}" onclick="filterMyIdeasTab('${s}')">
            ${s === 'all' ? 'All Ideas' : statusLabel(s)}
            <span class="filter-count">${counts[s]}</span>
        </button>`).join('');

    const filtered = _myIdeasFilter === 'all' ? myIdeas : myIdeas.filter(i => i.status === _myIdeasFilter);

    const listHtml = filtered.length
        ? filtered.map(i => renderIdeaCard(i)).join('')
        : `<div class="empty-state" style="text-align:center;padding:var(--sp-xl);color:var(--clr-muted)">
               <div style="font-size:2rem;margin-bottom:var(--sp-sm)">◉</div>
               <p>No ideas match this filter.</p>
           </div>`;

    const canSubmit = can('submitIdea');

    return `
    <div class="page-header">
        <div>
            <h1>My Ideas</h1>
            <p class="page-sub">${myIdeas.length} idea${myIdeas.length !== 1 ? 's' : ''} visible to you</p>
        </div>
        ${canSubmit ? `<button class="btn btn-primary" onclick="navigate('submit')">+ New Idea</button>` : ''}
    </div>

    <div class="filter-tabs">${tabsHtml}</div>

    <div class="ideas-list">${listHtml}</div>`;
}

// ── PAGE: Screening Queue ─────────────────────────────────────
function toggleScreeningCard(refCode) {
    const el = document.getElementById('scrn-card-' + refCode);
    if (el) el.classList.toggle('open');
}

function applyScreeningVerdict(refCode, verdict) {
    if (!can('screenIdeas')) return;
    const idea = IDEAS.find(i => i.refCode === refCode);
    if (!idea) return;
    const noteEl = document.getElementById('scrn-note-' + refCode);
    const notes  = noteEl ? noteEl.value.trim() : '';
    const me     = currentUser();
    const now    = new Date(PROTO_NOW).toISOString();

    idea.status        = verdict;
    idea.screeningNotes = notes || idea.screeningNotes || null;
    idea.screenedBy    = me.id;
    idea.screenedAt    = now;
    idea.updatedAt     = now;

    const actionLabel = verdict === 'eligible' ? 'IDEA_SCREENED_ELIGIBLE'
                      : verdict === 'ineligible' ? 'IDEA_SCREENED_INELIGIBLE'
                      : 'IDEA_SCREENED_NEEDS_REVIEW';
    appendAudit(actionLabel, refCode, `Marked ${verdict.replace('_',' ')}. ${notes ? 'Note: ' + notes : ''}`);
    renderPage();
}

function shortlistIdea(refCode) {
    if (!can('screenIdeas')) return;
    const idea = IDEAS.find(i => i.refCode === refCode);
    if (!idea || idea.status !== 'eligible') return;
    const me  = currentUser();
    const now = new Date(PROTO_NOW).toISOString();
    idea.status    = 'shortlisted';
    idea.updatedAt = now;
    appendAudit('IDEA_SHORTLISTED', refCode, 'Advanced to Shortlisted from Eligible.');
    renderPage();
}

function renderScreeningIdeaFields(idea) {
    const row = (label, val) => val ? `
        <div class="idea-field">
            <div class="idea-field-label">${label}</div>
            <div class="idea-field-value">${val}</div>
        </div>` : '';
    return `
    <div class="queue-idea-fields">
        ${row('Problem Statement', idea.problemStatement)}
        ${row('Proposed Solution', idea.proposedSolution)}
        ${row('Expected Benefits', idea.expectedBenefits)}
        ${row('Baseline Metric', idea.baselineMetric)}
        ${row('Improvement Target', idea.improvementTarget)}
        ${row('Resources Required', idea.resourcesRequired)}
    </div>`;
}

function renderScreeningCard(idea) {
    const me       = currentUser();
    const isReadOnly = !can('screenIdeas');
    const alreadyDone = ['eligible','ineligible','needs_review','shortlisted','finalist','winner'].includes(idea.status) && idea.screenedBy;
    const statusCls   = idea.status.replace('_','-');

    const doneBg = idea.status === 'eligible' || idea.status === 'shortlisted' ? '' : idea.status === 'ineligible' ? 'ineligible' : 'needs-review';
    const doneBox = alreadyDone ? `
        <div class="scrn-done-box ${doneBg}">
            Verdict: <strong>${statusLabel(idea.status)}</strong>
            ${idea.screeningNotes ? ` — "${idea.screeningNotes}"` : ''}
        </div>
        <div class="scrn-who">Screened by ${userName(idea.screenedBy)} on ${fmtTs(idea.screenedAt)}</div>` : '';

    const showNoteAndButtons = !isReadOnly && idea.status === 'submitted';
    const showEligibleActions = !isReadOnly && (idea.status === 'eligible');

    const noteBlock = showNoteAndButtons ? `
        <div class="form-group" style="margin-top:var(--sp-md)">
            <div class="scrn-note-label">Screener Notes <span style="font-weight:400;color:var(--clr-muted)">(optional — visible to admin and auditor)</span></div>
            <textarea id="scrn-note-${idea.refCode}" class="scrn-note-area" placeholder="Note any concerns, missing data, or reasons for your decision…">${idea.screeningNotes || ''}</textarea>
        </div>
        <div class="verdict-bar">
            <button class="verdict-btn eligible"    onclick="applyScreeningVerdict('${idea.refCode}','eligible')">Mark Eligible</button>
            <button class="verdict-btn needs-review" onclick="applyScreeningVerdict('${idea.refCode}','needs_review')">Needs Review</button>
            <button class="verdict-btn ineligible"  onclick="applyScreeningVerdict('${idea.refCode}','ineligible')">Mark Ineligible</button>
        </div>` : '';

    const eligibleActions = showEligibleActions ? `
        <div class="verdict-bar" style="margin-top:var(--sp-md)">
            <button class="verdict-btn eligible" onclick="shortlistIdea('${idea.refCode}')">Advance to Shortlisted</button>
        </div>` : '';

    const submitterName = userName(idea.submittedBy);
    const teamObj = idea.teamId ? TEAMS.find(t => t.id === idea.teamId) : null;
    const teamLabel = teamObj ? ` · ${teamObj.name}` : '';

    return `
    <div class="queue-card" id="scrn-card-${idea.refCode}">
        <div class="queue-card-header" onclick="toggleScreeningCard('${idea.refCode}')">
            <span class="queue-card-ref">${idea.refCode}</span>
            <span class="queue-card-title">${idea.title}</span>
            <span class="status-badge status-${statusCls}">${statusLabel(idea.status)}</span>
            <span class="queue-card-meta">${idea.category}</span>
            <span class="queue-card-meta">${submitterName}${teamLabel}</span>
            <span class="queue-card-chevron">&#9658;</span>
        </div>
        <div class="queue-card-body">
            ${renderScreeningIdeaFields(idea)}
            ${doneBox}
            ${noteBlock}
            ${eligibleActions}
        </div>
    </div>`;
}

function renderScreening() {
    const queue    = IDEAS.filter(i => i.status === 'submitted');
    const reviewed = IDEAS.filter(i => ['eligible','ineligible','needs_review'].includes(i.status) && i.screenedBy);

    const queueHtml = queue.length
        ? queue.map(renderScreeningCard).join('')
        : `<div class="empty-state" style="text-align:center;padding:var(--sp-xl);color:var(--clr-muted)">
               <div style="font-size:2rem;margin-bottom:var(--sp-sm)">◫</div>
               <p>No ideas awaiting screening.</p>
           </div>`;

    const reviewedHtml = reviewed.length
        ? reviewed.map(renderScreeningCard).join('')
        : `<div style="color:var(--clr-muted);font-size:var(--fs-sm);padding:var(--sp-sm) 0">None yet.</div>`;

    const totalScreened = IDEAS.filter(i => i.screenedBy).length;
    const totalPending  = queue.length;

    return `
    <div class="page-header">
        <div>
            <h1>Screening Queue</h1>
            <p class="page-sub">${totalPending} pending · ${totalScreened} screened</p>
        </div>
    </div>

    <div class="card-grid grid-4" style="margin-bottom:var(--sp-lg)">
        ${statCard('Pending','◫',totalPending,'','var(--clr-accent)')}
        ${statCard('Eligible',   '✓', IDEAS.filter(i=>i.status==='eligible').length,   '', 'var(--clr-eligible)')}
        ${statCard('Needs Review','!',IDEAS.filter(i=>i.status==='needs_review').length,'', '#d97706')}
        ${statCard('Ineligible', '✗', IDEAS.filter(i=>i.status==='ineligible').length, '', 'var(--clr-ineligible)')}
    </div>

    <div class="queue-section-title">Pending Screening (${totalPending})</div>
    ${queueHtml}

    <div class="queue-section-title" style="margin-top:var(--sp-xl)">Already Screened (${reviewed.length})</div>
    ${reviewedHtml}`;
}

// ── PAGE: Coaching ─────────────────────────────────────────────
function toggleCoachingCard(ideaId) {
    const el = document.getElementById('coach-card-' + ideaId);
    if (el) el.classList.toggle('open');
}

function logCoachingSession(ideaId) {
    if (!can('logCoaching')) return;
    const me = currentUser();
    const g  = id => (document.getElementById(id)?.value || '').trim();
    const dateVal  = g('cs-date-' + ideaId);
    const durVal   = g('cs-dur-' + ideaId);
    const notesVal = g('cs-notes-' + ideaId);
    const nextVal  = g('cs-next-' + ideaId);

    if (!dateVal || !notesVal) {
        alert('Session date and notes are required.');
        return;
    }
    const newId = 'cs-' + String(COACHING_SESSIONS.length + 1).padStart(2, '0');
    COACHING_SESSIONS.push({
        id:          newId,
        ideaId:      ideaId,
        coachId:     me.id,
        sessionDate: dateVal,
        durationMins: parseInt(durVal, 10) || 0,
        notes:       notesVal,
        nextSteps:   nextVal,
    });
    appendAudit('COACHING_SESSION_LOGGED', ideaId, `Session logged. ${parseInt(durVal,10)||0} min. ${notesVal.slice(0,80)}${notesVal.length>80?'…':''}`);
    renderPage();
}

function renderCoachingCard(idea) {
    const sessions = COACHING_SESSIONS.filter(s => s.ideaId === idea.refCode);
    const statusCls = idea.status.replace('_','-');
    const sessionCount = sessions.length;

    const sessionsHtml = sessions.length ? `
        <div class="session-log">
            ${sessions.map(s => `
            <div class="session-entry">
                <div class="session-entry-header">
                    <span class="session-date">${s.sessionDate}</span>
                    ${s.durationMins ? `<span class="session-dur">${s.durationMins} min</span>` : ''}
                    <span style="color:var(--clr-muted);font-size:11px">Coach: ${userName(s.coachId)}</span>
                </div>
                <div class="session-notes">${s.notes}</div>
                ${s.nextSteps ? `<div class="session-next">Next steps: ${s.nextSteps}</div>` : ''}
            </div>`).join('')}
        </div>` : `<p style="color:var(--clr-muted);font-size:var(--fs-sm);margin-bottom:var(--sp-md)">No sessions logged yet.</p>`;

    const logForm = can('logCoaching') ? `
        <div class="log-session-form">
            <div class="log-session-title">Log New Session</div>
            <div class="log-session-row">
                <div class="form-group" style="margin:0">
                    <label style="font-size:11px;font-weight:600">Session Date <span class="req">*</span></label>
                    <input type="date" id="cs-date-${idea.refCode}" class="form-input" value="${new Date(PROTO_NOW).toISOString().slice(0,10)}">
                </div>
                <div class="form-group" style="margin:0">
                    <label style="font-size:11px;font-weight:600">Duration (minutes)</label>
                    <input type="number" id="cs-dur-${idea.refCode}" class="form-input" min="15" max="240" step="15" placeholder="e.g. 60">
                </div>
            </div>
            <div class="form-group" style="margin-top:var(--sp-sm)">
                <label style="font-size:11px;font-weight:600">Session Notes <span class="req">*</span></label>
                <textarea id="cs-notes-${idea.refCode}" class="form-textarea" rows="3" placeholder="Key discussion points, advice given, concerns raised…"></textarea>
            </div>
            <div class="form-group" style="margin-top:var(--sp-sm)">
                <label style="font-size:11px;font-weight:600">Next Steps</label>
                <input id="cs-next-${idea.refCode}" class="form-input" placeholder="Action items for the submitter before next session or final evaluation…">
            </div>
            <div style="display:flex;justify-content:flex-end;margin-top:var(--sp-sm)">
                <button class="btn btn-primary btn-sm" onclick="logCoachingSession('${idea.refCode}')">Save Session</button>
            </div>
        </div>` : '';

    const teamObj = idea.teamId ? TEAMS.find(t => t.id === idea.teamId) : null;
    const teamLabel = teamObj ? ` · ${teamObj.name}` : '';

    return `
    <div class="coaching-card" id="coach-card-${idea.refCode}">
        <div class="coaching-card-header" onclick="toggleCoachingCard('${idea.refCode}')">
            <span class="coaching-card-ref">${idea.refCode}</span>
            <span class="coaching-card-title">${idea.title}</span>
            <span class="status-badge status-${statusCls}">${statusLabel(idea.status)}</span>
            <span class="coaching-card-sessions">${sessionCount} session${sessionCount !== 1 ? 's' : ''}</span>
            <span style="font-size:11px;color:var(--clr-muted);flex-shrink:0">${userName(idea.submittedBy)}${teamLabel}</span>
            <span class="coaching-card-chevron">&#9658;</span>
        </div>
        <div class="coaching-card-body">
            <div style="font-size:var(--fs-sm);color:var(--clr-muted);margin-bottom:var(--sp-md)">${idea.category}</div>
            <div style="font-size:var(--fs-sm);margin-bottom:var(--sp-md)"><strong>Proposed Solution:</strong> ${idea.proposedSolution || '—'}</div>
            ${sessionsHtml}
            ${logForm}
        </div>
    </div>`;
}

function renderCoaching() {
    const coachableStatuses = ['shortlisted', 'finalist'];
    const ideas = IDEAS.filter(i => coachableStatuses.includes(i.status));
    const totalSessions = COACHING_SESSIONS.length;

    const listHtml = ideas.length
        ? ideas.map(renderCoachingCard).join('')
        : `<div class="empty-state" style="text-align:center;padding:var(--sp-xl);color:var(--clr-muted)">
               <div style="font-size:2rem;margin-bottom:var(--sp-sm)">❋</div>
               <p>No shortlisted or finalist ideas available for coaching.</p>
           </div>`;

    return `
    <div class="page-header">
        <div>
            <h1>Coaching</h1>
            <p class="page-sub">${ideas.length} idea${ideas.length !== 1 ? 's' : ''} assigned · ${totalSessions} session${totalSessions !== 1 ? 's' : ''} logged</p>
        </div>
    </div>

    <div class="card-grid grid-4" style="margin-bottom:var(--sp-lg)">
        ${statCard('Assigned Ideas','❋', ideas.length, '', 'var(--clr-primary)')}
        ${statCard('Sessions Logged','◉', totalSessions, '', 'var(--clr-accent)')}
        ${statCard('Shortlisted','◈', IDEAS.filter(i=>i.status==='shortlisted').length, '', '#7c3aed')}
        ${statCard('Finalists','▲', IDEAS.filter(i=>i.status==='finalist').length, '', 'var(--clr-eligible)')}
    </div>

    ${listHtml}`;
}

// ── PAGE: Manage Team ─────────────────────────────────────────
function savePrizeSplit(teamId) {
    const team = TEAMS.find(t => t.id === teamId);
    if (!team || !can('manageTeam')) return;
    const newSplit = {};
    let total = 0;
    for (const memberId of team.members) {
        const el = document.getElementById('prize-' + teamId + '-' + memberId);
        const val = parseInt(el?.value || '0', 10);
        newSplit[memberId] = isNaN(val) ? 0 : val;
        total += newSplit[memberId];
    }
    if (total !== 100) {
        document.getElementById('split-total-' + teamId).textContent = `Total: ${total}% — must equal 100%`;
        document.getElementById('split-total-' + teamId).className = 'split-total-row over';
        return;
    }
    team.prizeSplit = newSplit;
    appendAudit('PRIZE_SPLIT_UPDATED', teamId, `Prize split updated. Members: ${team.members.map(id => userName(id) + ' ' + newSplit[id] + '%').join(', ')}`);
    document.getElementById('split-total-' + teamId).textContent = 'Saved ✓ — total 100%';
    document.getElementById('split-total-' + teamId).className = 'split-total-row ok';
}

function updateSplitTotal(teamId, memberId) {
    const team = TEAMS.find(t => t.id === teamId);
    if (!team) return;
    let total = 0;
    for (const mid of team.members) {
        const val = parseInt(document.getElementById('prize-' + teamId + '-' + mid)?.value || '0', 10);
        total += isNaN(val) ? 0 : val;
    }
    const lbl = document.getElementById('split-total-' + teamId);
    if (lbl) {
        lbl.textContent = `Total: ${total}%${total === 100 ? ' ✓' : ' (must equal 100%)'}`;
        lbl.className   = 'split-total-row ' + (total === 100 ? 'ok' : 'over');
    }
}

function renderTeamCard(team) {
    const me = currentUser();
    const isReadOnly = !can('manageTeam');
    const myTeamIdeas = IDEAS.filter(i => i.teamId === team.id);
    const split = team.prizeSplit || {};

    const membersHtml = team.members.map(memberId => {
        const user = USERS.find(u => u.id === memberId);
        if (!user) return '';
        const pct = split[memberId] ?? 0;
        const isLead = memberId === team.leadId;
        return `
        <tr>
            <td>
                <div style="display:flex;align-items:center;gap:var(--sp-sm)">
                    <div class="member-avatar-sm">${user.avatar}</div>
                    <div>
                        <div style="font-weight:600">${user.name}${isLead ? ' <span class="chip chip-shortlisted" style="font-size:10px">Lead</span>' : ''}</div>
                        <div style="font-size:11px;color:var(--clr-muted)">${user.dept} · ${ROLES[user.role]?.label || user.role}</div>
                    </div>
                </div>
            </td>
            <td>
                ${isReadOnly
                    ? `<strong>${pct}%</strong>`
                    : `<input type="number" id="prize-${team.id}-${memberId}" class="prize-input" min="0" max="100" value="${pct}"
                              oninput="updateSplitTotal('${team.id}','${memberId}')">`}
                <span class="prize-bar-wrap"><span class="prize-bar-fill" id="pbar-${team.id}-${memberId}" style="width:${pct}%"></span></span>
            </td>
        </tr>`;
    }).join('');

    const currentTotal = team.members.reduce((s, id) => s + (split[id] ?? 0), 0);

    return `
    <div class="card" style="margin-bottom:var(--sp-lg)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-md);flex-wrap:wrap;gap:var(--sp-sm)">
            <div>
                <div class="card-title" style="margin-bottom:2px">${team.name}</div>
                <div style="font-size:11px;color:var(--clr-muted)">Lead: ${userName(team.leadId)} · ${team.members.length} member${team.members.length!==1?'s':''} · ${myTeamIdeas.length} idea${myTeamIdeas.length!==1?'s':''}</div>
            </div>
        </div>
        <table class="member-table">
            <thead><tr><th>Member</th><th>Prize Share</th></tr></thead>
            <tbody>${membersHtml}</tbody>
        </table>
        ${!isReadOnly ? `
        <div style="display:flex;align-items:center;gap:var(--sp-md);margin-top:var(--sp-md);flex-wrap:wrap">
            <div id="split-total-${team.id}" class="split-total-row ${currentTotal===100?'ok':'over'}">Total: ${currentTotal}%${currentTotal===100?' ✓':' (must equal 100%)'}</div>
            <button class="btn btn-primary btn-sm" onclick="savePrizeSplit('${team.id}')">Save Split</button>
        </div>` : `<div class="split-total-row ok" style="margin-top:var(--sp-md)">Total: ${currentTotal}%</div>`}
    </div>`;
}

// ── PAGE: Scoring ──────────────────────────────────────────────
const CRITERIA = [
    { key: 'businessImpact',      label: 'Business Impact',      pct: '30%' },
    { key: 'feasibility',         label: 'Feasibility',          pct: '25%' },
    { key: 'innovation',          label: 'Innovation',           pct: '25%' },
    { key: 'strategicAlignment',  label: 'Strategic Alignment',  pct: '10%' },
    { key: 'scalability',         label: 'Scalability',          pct:  '5%' },
    { key: 'presentationClarity', label: 'Presentation Clarity', pct:  '5%' },
];

function toggleScoringCard(refCode) {
    const el = document.getElementById('sc-card-' + refCode);
    if (el) el.classList.toggle('open');
}

function updateLiveScore(ideaId) {
    const w = CYCLE.scoringWeights;
    let total = 0;
    for (const c of CRITERIA) {
        const val = parseInt(document.getElementById(`sc-${ideaId}-${c.key}`)?.value || 0, 10);
        total += val * (w[c.key] || 0);
        const numEl = document.getElementById(`sc-num-${ideaId}-${c.key}`);
        if (numEl) numEl.textContent = val;
    }
    const liveEl = document.getElementById('sc-live-' + ideaId);
    if (liveEl) {
        liveEl.textContent = total.toFixed(2);
        liveEl.style.color = total >= CYCLE.shortlistThreshold ? 'var(--clr-eligible)' : '#dc2626';
    }
}

function declareCOI(ideaId) {
    if (CYCLE.resultsLocked) return;
    const me = currentUser();
    const alreadyRecused = COI_RECUSALS.some(r => r.judgeId === me.id && r.ideaId === ideaId);
    if (alreadyRecused) return;
    const reasonEl = document.getElementById('coi-reason-' + ideaId);
    const reason   = (reasonEl?.value || '').trim();
    if (!reason) { alert('Please enter a reason for your recusal.'); return; }

    COI_RECUSALS.push({
        id:          'coi-' + String(COI_RECUSALS.length + 1).padStart(2, '0'),
        judgeId:     me.id,
        ideaId,
        reason,
        declaredAt:  new Date(PROTO_NOW).toISOString(),
    });
    appendAudit('COI_DECLARED', ideaId, `${me.name} declared conflict of interest and recused from scoring ${ideaId}.`);
    renderPage();
}

function submitScore(ideaId) {
    if (!can('scoreIdeas') || CYCLE.resultsLocked) return;
    const me = currentUser();
    const w  = CYCLE.scoringWeights;

    const vals = {};
    for (const c of CRITERIA) {
        const v = parseInt(document.getElementById(`sc-${ideaId}-${c.key}`)?.value || 0, 10);
        if (!v || v < 1 || v > 5) {
            alert(`Please set a score (1–5) for "${c.label}".`);
            return;
        }
        vals[c.key] = v;
    }
    const notes = (document.getElementById('sc-notes-' + ideaId)?.value || '').trim();
    const now   = new Date(PROTO_NOW).toISOString();
    const ws    = +(vals.businessImpact*w.businessImpact + vals.feasibility*w.feasibility +
                    vals.innovation*w.innovation + vals.strategicAlignment*w.strategicAlignment +
                    vals.scalability*w.scalability + vals.presentationClarity*w.presentationClarity).toFixed(2);

    const existing = SCORES.find(s => s.ideaId === ideaId && s.judgeId === me.id);
    if (existing) {
        Object.assign(existing, { ...vals, notes, submittedAt: now });
        appendAudit('IDEA_RESCORED', ideaId, `Score updated. Weighted total: ${ws}/5.00.`);
    } else {
        SCORES.push({
            id:          'sc-' + String(SCORES.length + 1).padStart(3, '0'),
            ideaId, judgeId: me.id, submittedAt: now,
            ...vals, notes,
        });
        appendAudit('IDEA_SCORED', ideaId, `Score submitted. Weighted total: ${ws}/5.00.`);
    }
    renderPage();
}

function renderScoreForm(idea, existingScore) {
    const me        = currentUser();
    const isLocked  = CYCLE.resultsLocked;
    const readonly  = isLocked || can('readOnly');
    const startVals = existingScore || { businessImpact:3, feasibility:3, innovation:3, strategicAlignment:3, scalability:3, presentationClarity:3 };
    const w = CYCLE.scoringWeights;
    const initWS = CRITERIA.reduce((t, c) => t + startVals[c.key] * w[c.key], 0);

    const slidersHtml = CRITERIA.map(c => {
        const val = startVals[c.key];
        return `
        <div class="criterion-row">
            <div class="criterion-header">
                <span class="criterion-label">${c.label}</span>
                <span class="criterion-weight">${c.pct} weight</span>
            </div>
            <div class="criterion-slider-row">
                <input type="range" class="score-slider" min="1" max="5" step="1"
                       id="sc-${idea.refCode}-${c.key}" value="${val}"
                       ${readonly ? 'disabled' : `oninput="updateLiveScore('${idea.refCode}')"`}>
                <span class="slider-val" id="sc-num-${idea.refCode}-${c.key}">${val}</span>
            </div>
            <div class="slider-labels"><span>1 — Weak</span><span>3 — Good</span><span>5 — Excellent</span></div>
        </div>`;
    }).join('');

    const liveColor = initWS >= CYCLE.shortlistThreshold ? 'var(--clr-eligible)' : '#dc2626';
    const liveBox = `
    <div class="live-score-box">
        <div>
            <div class="live-score-label">Weighted Score</div>
            <div class="live-score-num" id="sc-live-${idea.refCode}" style="color:${liveColor}">${initWS.toFixed(2)}</div>
        </div>
        <div class="live-score-threshold">
            <div>Shortlist threshold: <strong>${CYCLE.shortlistThreshold}</strong></div>
            <div style="margin-top:2px;font-size:10px">Max possible: 5.00</div>
        </div>
    </div>`;

    const notesEl = `
    <div class="form-group">
        <label style="font-size:var(--fs-sm);font-weight:600">Scoring Notes ${readonly ? '' : '<span style="font-weight:400;color:var(--clr-muted)">(will be visible to panel chair)</span>'}</label>
        <textarea id="sc-notes-${idea.refCode}" class="form-textarea" rows="2"
            ${readonly ? 'disabled' : ''}
            placeholder="Key observations, concerns, or strengths…">${existingScore?.notes || ''}</textarea>
    </div>`;

    const actions = readonly ? '' : `
    <div class="score-actions">
        ${existingScore ? `<span style="font-size:11px;color:var(--clr-muted)">Previously scored — updating will overwrite.</span>` : ''}
        <button class="btn btn-primary" onclick="submitScore('${idea.refCode}')">
            ${existingScore ? 'Update Score' : 'Submit Score'}
        </button>
    </div>`;

    return `
    <div class="criteria-grid">${slidersHtml}</div>
    ${liveBox}
    ${notesEl}
    ${actions}`;
}

function renderAllScoresSummary(idea) {
    const recused = COI_RECUSALS.filter(r => r.ideaId === idea.refCode);
    const recusedIds = recused.map(r => r.judgeId);
    const validScores = SCORES.filter(s => s.ideaId === idea.refCode && !recusedIds.includes(s.judgeId));
    const avg = computeIdeaScore(idea.refCode);

    const judges = USERS.filter(u => ['judge','panel_chair'].includes(u.role));
    const w = CYCLE.scoringWeights;

    const rows = judges.map(j => {
        const score = SCORES.find(s => s.ideaId === idea.refCode && s.judgeId === j.id);
        const isRecused = recusedIds.includes(j.id);
        const coi = isRecused ? recused.find(r => r.judgeId === j.id) : null;

        if (isRecused) {
            return `<tr>
                <td>${j.name}</td>
                <td colspan="7"><span class="coi-badge">⚠ CoI Recused</span> ${coi?.reason ? `<span style="font-size:11px;color:var(--clr-muted);margin-left:8px">${coi.reason.slice(0,80)}…</span>` : ''}</td>
            </tr>`;
        }
        if (!score) {
            return `<tr>
                <td>${j.name}</td>
                <td colspan="7" style="color:var(--clr-muted);font-size:11px">Not yet scored</td>
            </tr>`;
        }
        const ws = computeWeightedScore(score);
        const pillCls = ws >= CYCLE.shortlistThreshold ? 'pass' : 'fail';
        return `<tr>
            <td>${j.name}</td>
            <td>${score.businessImpact}</td>
            <td>${score.feasibility}</td>
            <td>${score.innovation}</td>
            <td>${score.strategicAlignment}</td>
            <td>${score.scalability}</td>
            <td>${score.presentationClarity}</td>
            <td><span class="score-pill ${pillCls}">${ws.toFixed(2)}</span></td>
        </tr>`;
    }).join('');

    const avgPillCls = avg !== null && avg >= CYCLE.shortlistThreshold ? 'pass' : 'fail';

    return `
    <div class="score-summary">
        <div class="score-summary-title">All Judge Scores</div>
        <div style="overflow-x:auto">
            <table class="score-table">
                <thead>
                    <tr>
                        <th>Judge</th>
                        <th title="Business Impact (30%)">BI</th>
                        <th title="Feasibility (25%)">Fe</th>
                        <th title="Innovation (25%)">In</th>
                        <th title="Strategic Alignment (10%)">SA</th>
                        <th title="Scalability (5%)">Sc</th>
                        <th title="Presentation Clarity (5%)">PC</th>
                        <th>Weighted</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
        ${avg !== null ? `
        <div class="score-avg-row">
            <span class="score-avg-label">Panel Average (${validScores.length} judge${validScores.length!==1?'s':''})</span>
            <span class="score-pill ${avgPillCls}" style="font-size:var(--fs-sm);padding:4px 14px">${avg.toFixed(2)}</span>
        </div>` : ''}
    </div>`;
}

function renderScoringCard(idea) {
    const me       = currentUser();
    const myScore  = SCORES.find(s => s.ideaId === idea.refCode && s.judgeId === me.id);
    const isCOI    = COI_RECUSALS.some(r => r.judgeId === me.id && r.ideaId === idea.refCode);
    const canScore = can('scoreIdeas') && !CYCLE.resultsLocked && !can('readOnly');
    const canViewAll = can('viewAllScores');
    const statusCls = idea.status.replace('_','-');
    const avg = computeIdeaScore(idea.refCode);
    const teamObj = idea.teamId ? TEAMS.find(t => t.id === idea.teamId) : null;
    const teamLabel = teamObj ? ` · ${teamObj.name}` : '';

    const avgBadge = avg !== null
        ? `<span class="score-pill ${avg >= CYCLE.shortlistThreshold ? 'pass' : 'fail'}">${avg.toFixed(2)}</span>`
        : `<span style="font-size:11px;color:var(--clr-muted)">Unscored</span>`;

    // Body content
    let bodyContent = '';

    if (isCOI) {
        const coiRecord = COI_RECUSALS.find(r => r.judgeId === me.id && r.ideaId === idea.refCode);
        bodyContent = `
        <div class="coi-declared-box">
            <strong>You have declared a conflict of interest</strong> and are recused from scoring this idea.<br>
            ${coiRecord?.reason ? `<span style="font-size:11px;margin-top:4px;display:block">Reason: "${coiRecord.reason}"</span>` : ''}
        </div>`;
    } else if (myScore && canScore) {
        bodyContent = `
        <div class="my-score-box">
            <span>Your current score: <strong>${computeWeightedScore(myScore).toFixed(2)}</strong></span>
            <span style="font-size:11px">Submitted ${fmtTs(myScore.submittedAt)}</span>
        </div>
        ${renderScoreForm(idea, myScore)}`;
    } else if (canScore) {
        // Show CoI option + score form
        bodyContent = `
        <details style="margin-bottom:var(--sp-md)">
            <summary style="cursor:pointer;font-size:var(--fs-sm);color:#d97706;font-weight:600">⚠ Declare Conflict of Interest</summary>
            <div class="coi-form">
                <div class="coi-form-title">CoI Declaration</div>
                <p style="font-size:var(--fs-sm);color:var(--clr-text);margin-bottom:var(--sp-sm)">
                    If you have a personal, financial, or professional interest in this idea, you must recuse yourself. This action is permanent and will be audit-logged.
                </p>
                <textarea id="coi-reason-${idea.refCode}" class="form-textarea" rows="2"
                    placeholder="State the nature of your conflict (e.g. I am a named stakeholder / I advised the submitter / financial interest)…"></textarea>
                <div style="display:flex;justify-content:flex-end;margin-top:var(--sp-sm)">
                    <button class="btn btn-outline btn-sm" style="border-color:#d97706;color:#d97706" onclick="declareCOI('${idea.refCode}')">Confirm Recusal</button>
                </div>
            </div>
        </details>
        ${renderScoreForm(idea, null)}`;
    } else if (can('readOnly') || canViewAll) {
        // View-only score form showing average
        bodyContent = myScore ? renderScoreForm(idea, myScore) : `<p style="color:var(--clr-muted);font-size:var(--fs-sm)">No scores recorded yet.</p>`;
    }

    if (canViewAll) {
        bodyContent += renderAllScoresSummary(idea);
    }

    return `
    <div class="scoring-card" id="sc-card-${idea.refCode}">
        <div class="scoring-card-header" onclick="toggleScoringCard('${idea.refCode}')">
            <span class="scoring-card-ref">${idea.refCode}</span>
            <span class="scoring-card-title">${idea.title}</span>
            <span class="status-badge status-${statusCls}">${statusLabel(idea.status)}</span>
            <span style="font-size:11px;color:var(--clr-muted);flex-shrink:0">${idea.category}</span>
            ${isCOI ? `<span class="coi-badge">CoI</span>` : myScore ? `<span class="chip chip-shortlisted" style="font-size:10px;flex-shrink:0">Scored</span>` : ''}
            ${avgBadge}
            <span class="scoring-card-chevron">&#9658;</span>
        </div>
        <div class="scoring-card-body">${bodyContent}</div>
    </div>`;
}

function renderScoring() {
    const finalists = IDEAS.filter(i => i.status === 'finalist');
    const me        = currentUser();
    const myScored  = new Set(SCORES.filter(s => s.judgeId === me.id).map(s => s.ideaId));
    const myRecused = new Set(COI_RECUSALS.filter(r => r.judgeId === me.id).map(r => r.ideaId));
    const pending   = finalists.filter(i => !myScored.has(i.refCode) && !myRecused.has(i.refCode)).length;
    const totalAvg  = finalists.length
        ? (finalists.reduce((s, i) => { const sc = computeIdeaScore(i.refCode); return sc ? s + sc : s; }, 0)
           / finalists.filter(i => computeIdeaScore(i.refCode) !== null).length || 0).toFixed(2)
        : '—';

    const lockedBanner = CYCLE.resultsLocked
        ? `<div class="locked-banner">🔒 Scoring is locked. Results have been finalised by the Panel Chair.</div>` : '';

    const listHtml = finalists.length
        ? finalists.map(renderScoringCard).join('')
        : `<div class="empty-state" style="text-align:center;padding:var(--sp-xl);color:var(--clr-muted)">
               <div style="font-size:2rem;margin-bottom:var(--sp-sm)">★</div>
               <p>No finalist ideas available for scoring.</p>
           </div>`;

    const w = CYCLE.scoringWeights;
    const weightsHtml = CRITERIA.map(c =>
        `<span style="font-size:11px;color:var(--clr-muted)">${c.label} <strong>${c.pct}</strong></span>`
    ).join(' · ');

    return `
    <div class="page-header">
        <div>
            <h1>Scoring Panel</h1>
            <p class="page-sub">${finalists.length} finalist idea${finalists.length !== 1 ? 's' : ''} · ${pending} pending your score</p>
        </div>
        ${CYCLE.resultsLocked && can('lockResults') ? `<button class="btn btn-outline" onclick="toggleResultsLock()">Unlock Results</button>` : ''}
        ${!CYCLE.resultsLocked && can('lockResults') ? `<button class="btn btn-primary" onclick="toggleResultsLock()">Lock Results</button>` : ''}
    </div>

    ${lockedBanner}

    <div class="card-grid grid-4" style="margin-bottom:var(--sp-lg)">
        ${statCard('Finalists',     '▲', finalists.length, '', 'var(--clr-primary)')}
        ${statCard('My Scored',     '★', myScored.size,    '', 'var(--clr-eligible)')}
        ${statCard('CoI Recusals',  '⚠', COI_RECUSALS.length, '', '#d97706')}
        ${statCard('Panel Avg',     '◈', totalAvg,         '', 'var(--clr-accent)')}
    </div>

    <div class="card" style="margin-bottom:var(--sp-lg);padding:var(--sp-md) var(--sp-lg)">
        <div style="font-size:11px;font-weight:700;color:var(--clr-muted);text-transform:uppercase;margin-bottom:6px">Scoring Criteria Weights</div>
        <div style="display:flex;flex-wrap:wrap;gap:var(--sp-md)">${weightsHtml}</div>
    </div>

    ${listHtml}`;
}

function toggleResultsLock() {
    if (!can('lockResults')) return;
    CYCLE.resultsLocked = !CYCLE.resultsLocked;
    appendAudit(
        CYCLE.resultsLocked ? 'RESULTS_LOCKED' : 'RESULTS_UNLOCKED',
        'CYCLE-2026',
        CYCLE.resultsLocked ? 'Scoring results locked by Panel Chair.' : 'Scoring results unlocked.'
    );
    renderPage();
}

// ── PAGE: Leaderboard ─────────────────────────────────────────
function renderCritBars(ideaId) {
    const miniCriteria = [
        { key: 'businessImpact', abbr: 'BI' },
        { key: 'feasibility',    abbr: 'Fe' },
        { key: 'innovation',     abbr: 'In' },
        { key: 'strategicAlignment', abbr: 'SA' },
        { key: 'scalability',    abbr: 'Sc' },
        { key: 'presentationClarity', abbr: 'PC' },
    ];
    return `<div class="crit-bar-wrap">${miniCriteria.map(c => {
        const avg = avgCriterion(ideaId, c.key);
        const pct = (avg / 5) * 100;
        return `<div class="crit-mini-row">
            <span class="crit-mini-label">${c.abbr}</span>
            <div class="crit-mini-bar"><div class="crit-mini-fill" style="width:${pct}%"></div></div>
            <span class="crit-mini-val">${avg.toFixed(1)}</span>
        </div>`;
    }).join('')}</div>`;
}

function renderPodium(rankings) {
    if (!rankings.length) return '';
    const order = [rankings[1], rankings[0], rankings[2]].filter(Boolean);
    const posClass = ['second', 'first', 'third'];
    const medals   = ['🥈', '🥇', '🥉'];
    const nums     = ['2', '1', '3'];

    const cols = order.map((r, i) => {
        const cls = posClass[i];
        const numOfJudges = SCORES.filter(s => s.ideaId === r.refCode && !COI_RECUSALS.some(c => c.judgeId === s.judgeId && c.ideaId === r.refCode)).length;
        const teamObj = r.teamId ? TEAMS.find(t => t.id === r.teamId) : null;
        return `
        <div class="podium-col ${cls}">
            <div class="podium-idea-card">
                <div class="podium-medal">${medals[i]}</div>
                <div class="podium-score">${r.avgScore.toFixed(2)}</div>
                <div class="podium-title">${r.title}</div>
                <div class="podium-sub">${r.refCode} · ${numOfJudges} judge${numOfJudges!==1?'s':''}</div>
                ${teamObj ? `<div class="podium-sub">${teamObj.name}</div>` : ''}
            </div>
            <div class="podium-base">${nums[i]}</div>
        </div>`;
    });

    return `<div class="podium-wrap">${cols.join('')}</div>`;
}

function renderLeaderboard() {
    const rankings = getIdeaRankings();
    const threshold = CYCLE.shortlistThreshold;
    const above = rankings.filter(r => r.avgScore >= threshold);
    const below  = rankings.filter(r => r.avgScore < threshold);

    const rankBadgeCls = n => n === 1 ? 'r1' : n === 2 ? 'r2' : n === 3 ? 'r3' : 'rn';

    const buildRows = (list, startRank) => list.map((r, idx) => {
        const rank    = startRank + idx;
        const numJudges = SCORES.filter(s => s.ideaId === r.refCode && !COI_RECUSALS.some(c => c.judgeId === s.judgeId && c.ideaId === r.refCode)).length;
        const teamObj   = r.teamId ? TEAMS.find(t => t.id === r.teamId) : null;
        const passClass = r.avgScore >= threshold ? 'pass' : 'fail';
        return `<tr>
            <td><span class="lb-rank-badge ${rankBadgeCls(rank)}">${rank}</span></td>
            <td>
                <div style="font-weight:600;font-size:var(--fs-sm)">${r.title}</div>
                <div style="font-size:11px;color:var(--clr-muted)">${r.refCode} · ${r.category}</div>
                ${teamObj ? `<div style="font-size:11px;color:var(--clr-muted)">${teamObj.name}</div>` : ''}
            </td>
            <td style="font-size:11px;color:var(--clr-muted)">${userName(r.submittedBy)}</td>
            <td><span class="score-pill ${passClass}" style="font-size:var(--fs-sm);padding:4px 12px">${r.avgScore.toFixed(2)}</span></td>
            <td style="font-size:11px;color:var(--clr-muted)">${numJudges}</td>
            <td>${renderCritBars(r.refCode)}</td>
        </tr>`;
    }).join('');

    const belowSeparator = below.length ? `
        <tr class="threshold-line"><td colspan="6"></td></tr>
        <tr class="threshold-label-row"><td colspan="6">Below shortlist threshold (${threshold}) — ${below.length} idea${below.length!==1?'s':''}</td></tr>
    ` : '';

    const tableHtml = rankings.length ? `
        <div style="overflow-x:auto">
            <table class="lb-full-table">
                <thead><tr>
                    <th>#</th><th>Idea</th><th>Submitter</th><th>Score</th><th>Judges</th><th>Criteria</th>
                </tr></thead>
                <tbody>
                    ${buildRows(above, 1)}
                    ${belowSeparator}
                    ${buildRows(below, above.length + 1)}
                </tbody>
            </table>
        </div>` : `<p class="text-muted">No finalist ideas have been scored yet.</p>`;

    const unscored = IDEAS.filter(i => i.status === 'finalist' && computeIdeaScore(i.refCode) === null);

    return `
    <div class="page-header">
        <div>
            <h1>Leaderboard</h1>
            <p class="page-sub">${rankings.length} ranked · ${unscored.length} unscored finalist${unscored.length!==1?'s':''}</p>
        </div>
    </div>

    <div class="card-grid grid-4" style="margin-bottom:var(--sp-lg)">
        ${statCard('Ranked',          '▲', rankings.length,       '', 'var(--clr-primary)')}
        ${statCard('Above Threshold', '✓', above.length,          '', 'var(--clr-eligible)')}
        ${statCard('Below Threshold', '✗', below.length,          '', 'var(--clr-ineligible)')}
        ${statCard('Unscored',        '◌', unscored.length,       '', 'var(--clr-muted)')}
    </div>

    ${rankings.length >= 1 ? `
    <div class="card" style="margin-bottom:var(--sp-lg)">
        <div class="card-title">Top ${Math.min(rankings.length, 3)}</div>
        ${renderPodium(rankings)}
    </div>` : ''}

    <div class="card">
        <div class="card-title" style="margin-bottom:var(--sp-md)">Full Rankings</div>
        <div style="font-size:11px;color:var(--clr-muted);margin-bottom:var(--sp-md)">
            Criteria columns: BI = Business Impact (30%), Fe = Feasibility (25%), In = Innovation (25%), SA = Strategic Alignment (10%), Sc = Scalability (5%), PC = Presentation Clarity (5%)
        </div>
        ${tableHtml}
    </div>`;
}

// ── PAGE: ExCom Selection ──────────────────────────────────────
function toggleExcomPacket(refCode) {
    const el = document.getElementById('excom-pkt-' + refCode);
    if (el) el.classList.toggle('open');
}

function castExcomVote(ideaId, placement) {
    if (!can('castExcomVote')) return;
    const me   = currentUser();
    const notes = (document.getElementById('excom-note-' + ideaId)?.value || '').trim();
    const now  = new Date(PROTO_NOW).toISOString();

    // Remove any existing vote by this member for same placement or same idea
    const remove = EXCOM_VOTES.filter(v =>
        v.voterId === me.id && (v.placement === placement || v.ideaId === ideaId)
    );
    remove.forEach(v => {
        const idx = EXCOM_VOTES.indexOf(v);
        if (idx > -1) EXCOM_VOTES.splice(idx, 1);
    });

    EXCOM_VOTES.push({
        id:        'ev-' + String(EXCOM_VOTES.length + 1).padStart(2, '0'),
        voterId:   me.id,
        ideaId,
        placement,
        notes,
        votedAt:   now,
    });
    appendAudit('EXCOM_VOTE_CAST', ideaId, `${me.name} placed idea at position ${placement}.`);
    renderPage();
}

function clearExcomVote(ideaId) {
    const me = currentUser();
    const idx = EXCOM_VOTES.findIndex(v => v.voterId === me.id && v.ideaId === ideaId);
    if (idx > -1) { EXCOM_VOTES.splice(idx, 1); renderPage(); }
}

function confirmWinners() {
    if (!can('lockResults')) return;
    // Tally votes: 1st=3pts, 2nd=2pts, 3rd=1pt
    const tally = {};
    for (const v of EXCOM_VOTES) {
        const pts = v.placement === 1 ? 3 : v.placement === 2 ? 2 : 1;
        tally[v.ideaId] = (tally[v.ideaId] || 0) + pts;
    }
    const sorted  = Object.entries(tally).sort((a, b) => b[1] - a[1]);
    const topIds  = sorted.slice(0, 3).map(([id]) => id);
    const me      = currentUser();
    const now     = new Date(PROTO_NOW).toISOString();

    for (const id of topIds) {
        const idea = IDEAS.find(i => i.refCode === id);
        if (idea) {
            idea.status    = 'winner';
            idea.updatedAt = now;
            appendAudit('IDEA_WINNER_CONFIRMED', id, `ExCom confirmed ${id} as winner.`);
        }
    }
    CYCLE.resultsLocked = true;
    appendAudit('RESULTS_LOCKED', 'CYCLE-2026', 'Winners confirmed and results locked by ExCom/Admin.');
    renderPage();
}

function renderExcomPacket(idea, rank) {
    const me       = currentUser();
    const myVote   = EXCOM_VOTES.find(v => v.voterId === me.id && v.ideaId === idea.refCode);
    const rankCls  = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : 'rn';
    const pScore   = computeIdeaScore(idea.refCode);
    const passClass = pScore !== null && pScore >= CYCLE.shortlistThreshold ? 'pass' : 'fail';
    const teamObj   = idea.teamId ? TEAMS.find(t => t.id === idea.teamId) : null;
    const numJudges = SCORES.filter(s => s.ideaId === idea.refCode && !COI_RECUSALS.some(c => c.judgeId === s.judgeId && c.ideaId === idea.refCode)).length;
    const coiCount  = COI_RECUSALS.filter(r => r.ideaId === idea.refCode).length;

    const placementLabel = p => p === 1 ? '🥇 1st Place' : p === 2 ? '🥈 2nd Place' : '🥉 3rd Place';

    const voteBadge = myVote
        ? `<span class="my-vote-badge p${myVote.placement}">${placementLabel(myVote.placement)}</span>` : '';

    const voteSection = can('castExcomVote') && !CYCLE.resultsLocked ? `
        <div class="vote-section">
            <div class="vote-section-title">Cast Your Vote</div>
            ${myVote ? `<div style="margin-bottom:var(--sp-sm);font-size:var(--fs-sm);color:var(--clr-muted)">Current selection: ${placementLabel(myVote.placement)}
                <button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="clearExcomVote('${idea.refCode}')">Clear</button></div>` : ''}
            <div class="placement-btns">
                <button class="placement-btn p1${myVote?.placement===1?' active':''}" onclick="castExcomVote('${idea.refCode}',1)">🥇 1st Place</button>
                <button class="placement-btn p2${myVote?.placement===2?' active':''}" onclick="castExcomVote('${idea.refCode}',2)">🥈 2nd Place</button>
                <button class="placement-btn p3${myVote?.placement===3?' active':''}" onclick="castExcomVote('${idea.refCode}',3)">🥉 3rd Place</button>
            </div>
            <div class="form-group" style="margin-top:var(--sp-sm)">
                <label style="font-size:11px;font-weight:600;color:var(--clr-muted)">Rationale (optional)</label>
                <textarea id="excom-note-${idea.refCode}" class="form-textarea" rows="2"
                    placeholder="Brief justification for your placement decision…">${myVote?.notes||''}</textarea>
            </div>
        </div>` : '';

    const viewAllVotes = can('viewAllScores') ? (() => {
        const votes = EXCOM_VOTES.filter(v => v.ideaId === idea.refCode);
        if (!votes.length) return '';
        return `<div style="margin-top:var(--sp-sm);font-size:11px;color:var(--clr-muted)">
            Votes received: ${votes.map(v => `${userName(v.voterId)}: ${placementLabel(v.placement)}`).join(' · ')}
        </div>`;
    })() : '';

    return `
    <div class="excom-packet" id="excom-pkt-${idea.refCode}">
        <div class="excom-packet-header" onclick="toggleExcomPacket('${idea.refCode}')">
            <span class="lb-rank-badge ${rankCls}" style="width:36px;height:36px;font-size:var(--fs-base)">${rank}</span>
            <span class="excom-packet-title">${idea.title}</span>
            <span class="status-badge status-finalist">${idea.category}</span>
            ${pScore !== null ? `<span class="score-pill ${passClass}" style="flex-shrink:0">${pScore.toFixed(2)}</span>` : ''}
            ${voteBadge}
            ${coiCount ? `<span class="coi-badge" style="flex-shrink:0">⚠ ${coiCount} CoI</span>` : ''}
            <span class="excom-packet-chevron">&#9658;</span>
        </div>
        <div class="excom-packet-body">
            <div class="excom-summary-grid">
                <div class="excom-field">
                    <div class="excom-field-label">Problem Statement</div>
                    <div style="font-size:var(--fs-sm)">${idea.problemStatement || '—'}</div>
                </div>
                <div class="excom-field">
                    <div class="excom-field-label">Expected Benefits</div>
                    <div style="font-size:var(--fs-sm)">${idea.expectedBenefits || '—'}</div>
                </div>
                <div class="excom-field">
                    <div class="excom-field-label">Proposed Solution</div>
                    <div style="font-size:var(--fs-sm)">${idea.proposedSolution || '—'}</div>
                </div>
                <div class="excom-field">
                    <div class="excom-field-label">Submitter / Team</div>
                    <div style="font-size:var(--fs-sm)">${userName(idea.submittedBy)}${teamObj ? ` · ${teamObj.name}` : ''}<br>
                    <span style="font-size:11px;color:var(--clr-muted)">${numJudges} judge score${numJudges!==1?'s':''} · Panel avg: ${pScore!==null?pScore.toFixed(2):'—'}</span>
                    </div>
                </div>
            </div>
            ${renderCritBars(idea.refCode)}
            ${viewAllVotes}
            ${voteSection}
        </div>
    </div>`;
}

function renderExcom() {
    const rankings = getIdeaRankings();
    const me       = currentUser();
    const myVotes  = EXCOM_VOTES.filter(v => v.voterId === me.id);
    const winners  = IDEAS.filter(i => i.status === 'winner');

    // All excom voters and their selections

    const voteStatus  = excomVoters.map(u => {
        const votes = EXCOM_VOTES.filter(v => v.voterId === u.id);
        return `${u.name}: ${votes.length ? votes.sort((a,b)=>a.placement-b.placement).map(v=>`${['🥇','🥈','🥉'][v.placement-1]} ${v.ideaId}`).join(', ') : 'No votes yet'}`;

        <div class="winner-banner">
            <div class="winner-banner-title">🏆 Winners Confirmed</div>
            <div style="font-size:var(--fs-sm);color:var(--clr-text)">
                ${winners.map((w,i) => `${['🥇','🥈','🥉'][i]||'·'} <strong>${w.title}</strong> (${w.refCode})`).join('<br>')}

    const confirmBar = can('lockResults') && !hasConfirmedWinners && EXCOM_VOTES.length > 0 ? `
        <div class="excom-confirm-bar">
            <div style="flex:1">
                <div style="font-size:var(--fs-sm);font-weight:700">Confirm Winners</div>
                <div style="font-size:11px;color:var(--clr-muted)">Ideas with the highest vote-weighted scores (1st=3pts, 2nd=2pts, 3rd=1pt) will be promoted to Winner status and results locked.</div>
            </div>
            <button class="btn btn-primary" onclick="confirmWinners()">Confirm & Lock Winners</button>
        </div>` : '';

    const packetsHtml = rankings.length
        ? rankings.map((r, idx) => renderExcomPacket(r, idx + 1)).join('')
        : `<div class="empty-state" style="text-align:center;padding:var(--sp-xl);color:var(--clr-muted)">
               <div style="font-size:2rem;margin-bottom:var(--sp-sm)">◆</div>
               <p>No ranked finalist ideas available yet.</p>
           </div>`;

    return `
    <div class="page-header">
        <div>
            <h1>ExCom Selection</h1>
            <p class="page-sub">${rankings.length} finalist idea${rankings.length!==1?'s':''} · ${myVotes.length} of 3 placements assigned</p>
        </div>
    </div>

    <div class="card-grid grid-4" style="margin-bottom:var(--sp-lg)">
        ${statCard('Finalists',        '◆', rankings.length,         '', 'var(--clr-primary)')}
        ${statCard('My Votes Cast',    '✓', myVotes.length,          '', 'var(--clr-eligible)')}
        ${statCard('Total Votes',      '◈', EXCOM_VOTES.length,      '', 'var(--clr-accent)')}
        ${statCard('Winners Confirmed','🏆', winners.length,          '', winners.length ? '#b45309' : 'var(--clr-muted)')}
    </div>

    ${winnerBanner}
    ${confirmBar}

    <div style="font-size:11px;color:var(--clr-muted);margin-bottom:var(--sp-md)">${voteStatus}</div>

    ${can('castExcomVote') && !CYCLE.resultsLocked && myVotes.length < 3 ? `
        <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:var(--radius);padding:var(--sp-sm) var(--sp-md);margin-bottom:var(--sp-md);font-size:var(--fs-sm);color:#1e40af">
            Assign 1st, 2nd, and 3rd place to three different ideas. Open each information packet below to cast your placement.
        </div>` : ''}

    ${packetsHtml}`;
}

let _adminTab = 'cycle';

function switchAdminTab(tab) {

    renderPage();
}

function advanceStage() {
    const activeIdx = CYCLE.stages.findIndex(s => s.state === 'active');
    if (activeIdx === -1 || activeIdx >= CYCLE.stages.length - 1) return;
    if (!confirm(`Advance stage from "${CYCLE.stages[activeIdx].label}" to "${CYCLE.stages[activeIdx + 1].label}"?`)) return;
    CYCLE.stages[activeIdx].state     = 'done';
    CYCLE.stages[activeIdx + 1].state = 'active';
    CYCLE.currentStage = CYCLE.stages[activeIdx + 1].id;
    appendAudit('STAGE_ADVANCED', 'CYCLE-2026',
        `Stage advanced from ${CYCLE.stages[activeIdx].label} to ${CYCLE.stages[activeIdx + 1].label}.`);
    showToast(`Stage advanced to <strong>${CYCLE.stages[activeIdx + 1].label}</strong>`, 'success');
    renderPage();
}

function overrideIdeaStatus(refCode) {
    if (!can('manageUsers')) return;
    const sel = document.getElementById('override-status-' + refCode);
    if (!sel) return;
    const newStatus = sel.value;
    const idea = IDEAS.find(i => i.refCode === refCode);
    if (!idea || idea.status === newStatus) return;
    const oldStatus = idea.status;
    idea.status    = newStatus;
    idea.updatedAt = new Date(PROTO_NOW).toISOString();
    appendAudit('IDEA_STATUS_OVERRIDE', refCode,
        `Admin overrode status from ${statusLabel(oldStatus)} to ${statusLabel(newStatus)}.`);
    showToast(`${refCode} → <strong>${statusLabel(newStatus)}</strong>`, 'success');
    renderPage();
}

function changeUserRole(userId) {
    if (!can('manageUsers')) return;
    const sel = document.getElementById('role-sel-' + userId);
    if (!sel) return;
    const newRole = sel.value;
    const user    = USERS.find(u => u.id === userId);
    if (!user || user.role === newRole) return;
    const oldRole = user.role;
    user.role     = newRole;
    appendAudit('USER_ROLE_CHANGED', userId,
        `${user.name}: role changed from ${ROLES[oldRole]?.label || oldRole} to ${ROLES[newRole]?.label || newRole}.`);
    showToast(`${user.name} → <strong>${ROLES[newRole]?.label || newRole}</strong>`, 'success');
    renderPage();
}

function renderAdminCycleTab() {
    const activeIdx = CYCLE.stages.findIndex(s => s.state === 'active');
    const nextStage = activeIdx >= 0 && activeIdx < CYCLE.stages.length - 1
        ? CYCLE.stages[activeIdx + 1] : null;

    const stagesHtml = CYCLE.stages.map(s => `
        <div class="stage-mgmt-row ${s.state}">
            <div class="stage-dot ${s.state}"></div>
            <div class="stage-mgmt-label">${s.label}</div>
            <div class="stage-dates">${s.start} → ${s.end}</div>
            <span class="chip ${s.state === 'done' ? 'chip-eligible' : s.state === 'active' ? 'chip-review' : 'chip-muted'}">${s.state === 'done' ? 'Done' : s.state === 'active' ? 'Active' : 'Upcoming'}</span>
        </div>`).join('');

    const weightsHtml = CRITERIA.map(c => {
        const w = CYCLE.scoringWeights[c.key];
        return `<div class="weight-row">
            <div class="weight-label">${c.label}</div>
            <div class="weight-bar-bg"><div class="weight-bar-fill" style="width:${w * 100}%"></div></div>
            <div class="weight-pct">${(w * 100).toFixed(0)}%</div>
        </div>`;
    }).join('');

    const prizes = CYCLE.prizes;
    const prizeHtml = `
        <div class="prize-cards">
            <div class="prize-card first"><div class="prize-medal">🥇</div><div class="prize-amount">${prizes.first.amount.toLocaleString()} ${prizes.first.currency}</div><div class="prize-lbl">${prizes.first.label}</div></div>
            <div class="prize-card second"><div class="prize-medal">🥈</div><div class="prize-amount">${prizes.second.amount.toLocaleString()} ${prizes.second.currency}</div><div class="prize-lbl">${prizes.second.label}</div></div>
            <div class="prize-card third"><div class="prize-medal">🥉</div><div class="prize-amount">${prizes.third.amount.toLocaleString()} ${prizes.third.currency}</div><div class="prize-lbl">${prizes.third.label}</div></div>
        </div>`;

    return `
    <div class="admin-section">
        <div class="admin-section-hdr">Stage Management</div>
        <div class="stage-mgmt-list">${stagesHtml}</div>
        <div style="display:flex;gap:var(--sp-sm);margin-top:var(--sp-md);align-items:center;flex-wrap:wrap">
            ${nextStage
                ? `<button class="btn btn-primary" onclick="advanceStage()">Advance to ${nextStage.label} →</button>`
                : `<span style="color:var(--clr-muted);font-size:var(--fs-sm)">All stages complete.</span>`}
            <span style="font-size:11px;color:var(--clr-muted)">Current: <strong>${CYCLE.currentStage}</strong></span>
        </div>
    </div>

    <div class="admin-section">
        <div class="admin-section-hdr">Scoring Weights (read-only)</div>
        <div style="margin-bottom:var(--sp-sm);font-size:11px;color:var(--clr-muted)">Shortlist threshold: <strong>${CYCLE.shortlistThreshold} / 5.00</strong></div>
        ${weightsHtml}
    </div>

    <div class="admin-section">
        <div class="admin-section-hdr">Prize Structure</div>
        ${prizeHtml}
    </div>

    <div class="admin-section">
        <div class="admin-section-hdr">Scoring Lock</div>
        <div style="display:flex;align-items:center;gap:var(--sp-md)">
            <span style="font-size:var(--fs-sm)">Results: <strong>${CYCLE.resultsLocked ? '🔒 Locked' : '🔓 Unlocked'}</strong></span>
            <button class="btn ${CYCLE.resultsLocked ? 'btn-outline' : 'btn-primary'}" onclick="toggleResultsLock()">
                ${CYCLE.resultsLocked ? 'Unlock Results' : 'Lock Results'}
            </button>
        </div>
    </div>`;
}

// ── PAGE: Audit Log ────────────────────────────────────────────
let _auditSearch      = '';
let _auditActorFilter = '';
let _auditActionFilter = '';

function auditActionClass(action) {
    const a = (action || '').toUpperCase();
    if (a.includes('SUBMIT') || a.includes('IDEA_UPDATED')) return 'aat-submit';
    if (a.includes('SCREEN') || a.includes('SHORTLIST') || a.includes('ELIGIBLE') || a.includes('FINALIST') || a.includes('WINNER')) return 'aat-screen';
    if (a.includes('COACH')) return 'aat-coach';
    if (a.includes('SCOR') || a.includes('LOCK')) return 'aat-score';
    if (a.includes('COI')) return 'aat-coi';
    if (a.includes('STAGE') || a.includes('USER_ROLE') || a.includes('PRIZE') || a.includes('OVERRIDE') || a.includes('RESET')) return 'aat-admin';
    if (a.includes('EXCOM') || a.includes('VOTE')) return 'aat-excom';
    return 'aat-default';
}

function applyAuditFilters() {
    _auditSearch       = (document.getElementById('audit-search')?.value || '').toLowerCase();
    _auditActorFilter  = document.getElementById('audit-actor-filter')?.value || '';
    _auditActionFilter = document.getElementById('audit-action-filter')?.value || '';
    const tbody = document.getElementById('audit-tbody');
    if (!tbody) return;
    tbody.innerHTML = buildAuditRows();
    document.getElementById('audit-count')?.textContent && updateAuditCount();
}

function updateAuditCount() {
    const count = document.getElementById('audit-tbody')?.querySelectorAll('tr').length || 0;
    const el    = document.getElementById('audit-count');
    if (el) el.textContent = count + ' entries shown';
}

function buildAuditRows() {
    const log = [...AUDIT_LOG].reverse();
    const filtered = log.filter(e => {
        const actorName = userName(e.actor).toLowerCase();
        const matchSearch = !_auditSearch
            || actorName.includes(_auditSearch)
            || (e.action || '').toLowerCase().includes(_auditSearch)
            || (e.entity || '').toLowerCase().includes(_auditSearch)
            || (e.detail || '').toLowerCase().includes(_auditSearch);
        const matchActor  = !_auditActorFilter || e.actor === _auditActorFilter;
        const matchAction = !_auditActionFilter || auditActionClass(e.action) === _auditActionFilter;
        return matchSearch && matchActor && matchAction;
    });

    if (!filtered.length) {
        return `<tr><td colspan="5" style="text-align:center;color:var(--clr-muted);padding:var(--sp-xl)">No entries match the current filters.</td></tr>`;
    }

    return filtered.map(e => {
        const cls = auditActionClass(e.action);
        return `<tr>
            <td style="font-size:11px;white-space:nowrap;color:var(--clr-muted)">${fmtTs(e.ts)}</td>
            <td>
                <div style="display:flex;align-items:center;gap:6px">
                    <div class="member-avatar-sm" style="width:24px;height:24px;font-size:9px">${USERS.find(u=>u.id===e.actor)?.avatar||'?'}</div>
                    <span style="font-size:var(--fs-sm);font-weight:600">${userName(e.actor)}</span>
                </div>
                <div style="font-size:10px;color:var(--clr-muted)">${USERS.find(u=>u.id===e.actor)?.dept||''}</div>
            </td>
            <td><span class="audit-action-tag ${cls}">${e.action}</span></td>
            <td class="audit-entity">${e.entity || ''}</td>
            <td class="audit-detail">${e.detail || ''}</td>
        </tr>`;
    }).join('');
}

function exportAuditLog() {
    const log = [...AUDIT_LOG].reverse();
    const header = ['Timestamp','Actor','Department','Action','Entity','Detail'];
    const rows = log.map(e => [
        e.ts,
        userName(e.actor),
        USERS.find(u => u.id === e.actor)?.dept || '',
        e.action,
        e.entity || '',
        (e.detail || '').replace(/,/g, ';'),
    ].map(v => `"${v}"`).join(','));
    const csv  = [header.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `KFHInnovationHub_AuditLog_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Audit log exported as CSV', 'success');
}

function renderAuditLog() {
    const uniqueActors  = [...new Set(AUDIT_LOG.map(e => e.actor))];
    const actionCategories = [
        { value: 'aat-submit',  label: 'Submissions'      },
        { value: 'aat-screen',  label: 'Screening & Status'},
        { value: 'aat-coach',   label: 'Coaching'         },
        { value: 'aat-score',   label: 'Scoring & Lock'   },
        { value: 'aat-coi',     label: 'CoI Declarations' },
        { value: 'aat-admin',   label: 'Admin Actions'    },
        { value: 'aat-excom',   label: 'ExCom Votes'      },
    ];

    const actorOptions = uniqueActors.map(id =>
        `<option value="${id}"${_auditActorFilter === id ? ' selected' : ''}>${userName(id)}</option>`
    ).join('');

    const actionOptions = actionCategories.map(c =>
        `<option value="${c.value}"${_auditActionFilter === c.value ? ' selected' : ''}>${c.label}</option>`
    ).join('');

    const initialRows = buildAuditRows();
    const shownCount  = (initialRows.match(/<tr>/g) || []).length;

    return `
    <div class="page-header">
        <div>
            <h1>Audit Log</h1>
            <p class="page-sub">${AUDIT_LOG.length} total entries · immutable record</p>
        </div>
        <button class="btn btn-outline" onclick="exportAuditLog()">Export CSV</button>
    </div>

    <div class="card">
        <div class="audit-filter-bar">
            <div class="audit-filter-group">
                <div class="audit-filter-label">Search</div>
                <input id="audit-search" class="audit-search" placeholder="Actor, action, entity, detail…"
                    value="${_auditSearch}" oninput="applyAuditFilters()">
            </div>
            <div class="audit-filter-group">
                <div class="audit-filter-label">Actor</div>
                <select id="audit-actor-filter" class="audit-select" onchange="applyAuditFilters()">
                    <option value="">All actors</option>
                    ${actorOptions}
                </select>
            </div>
            <div class="audit-filter-group">
                <div class="audit-filter-label">Category</div>
                <select id="audit-action-filter" class="audit-select" onchange="applyAuditFilters()">
                    <option value="">All categories</option>
                    ${actionOptions}
                </select>
            </div>
            <div style="align-self:flex-end">
                <button class="btn btn-ghost btn-sm" onclick="_auditSearch='';_auditActorFilter='';_auditActionFilter='';renderPage()">Clear</button>
            </div>
        </div>

        <div class="audit-count-bar">
            <span id="audit-count">${shownCount} entries shown</span>
            <span>·</span>
            <span>${AUDIT_LOG.length} total</span>
        </div>

        <div style="overflow-x:auto">
            <table class="audit-table">
                <thead><tr>
                    <th>Timestamp</th><th>Actor</th><th>Action</th><th>Entity</th><th>Detail</th>
                </tr></thead>
                <tbody id="audit-tbody">${initialRows}</tbody>
            </table>
        </div>
    </div>`;
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg, type = 'info') {
    const ICONS = { success:'✓', error:'✕', warning:'⚠', info:'ℹ' };
    const TYPES = { success:'toast-success', error:'toast-error', warning:'toast-warning', info:'' };
    const t = document.createElement('div');
    t.className = `toast ${TYPES[type] || ''}`;
    t.innerHTML = `<span class="toast-icon">${ICONS[type] || 'ℹ'}</span><span class="toast-msg">${msg}</span>`;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => {
        t.classList.add('removing');
        t.addEventListener('animationend', () => t.remove());
    }, 3200);
}

// ── MOBILE SIDEBAR ────────────────────────────────────────────
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('visible');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('visible');
}

</script>
